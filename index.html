function updateTieOptions() {
  const [mode, tgt] = $("#hMode").value.split(":");
  const pointsEl = $("#hPoints");
  if (tgt === "custom") {
    pointsEl.disabled = false;
  } else {
    pointsEl.value = tgt;   // mirror the chosen target
    pointsEl.disabled = true;
  }
  const target = tgt === "custom" ? (+pointsEl.value || 24) : +tgt;
  const tie = $("#hTie");
  if (mode === "race") {
    tie.innerHTML = `<option value="tiebreak">Tiebreak game at ${target - 1}–${target - 1} (7-pt TB decides, ends ${target}–${target - 1})</option>
      <option value="normal">Normal game at ${target - 1}–${target - 1} (ends ${target}–${target - 1})</option>
      <option value="winby2">Win by 2 — play on past ${target - 1}–${target - 1} (e.g. ${target + 1}–${target - 1})</option>`;
    tie.disabled = false;
  } else if (target % 2 === 0) {
    tie.innerHTML = `<option value="golden">Golden point decider (${target / 2}–${target / 2} becomes ${target / 2 + 1}–${target / 2})</option>
      <option value="draw">Draw — ${target / 2}–${target / 2} stands</option>`;
    tie.disabled = false;
  } else {
    tie.innerHTML = `<option value="none">Not possible — odd total, always a winner</option>`;
    tie.disabled = true;
  }
}

function onFormatChange() {
  const isTeam = $("#hFormat").value === "team";
  $("#playersBlock").style.display = isTeam ? "none" : "";
  $("#teamBlock").style.display = isTeam ? "" : "none";
}

/* resolve a free-text name to a roster player (case-insensitive) or create a new one */
let customSeq = 0;
function resolveName(name) {
  const n = name.trim();
  if (!n) return null;
  const p = PLAYERS.find(x => x.name.toLowerCase() === n.toLowerCase());
  if (p) return p.id;
  const id = "c" + Date.now() + "_" + (++customSeq);
  PLAYERS.push({ id, name: n });
  RATINGS[id] = CONFIG.eloStart;
  return id;
}

/* real-time refresh from the Cloudflare Worker (latest joiners, seconds before play) */
let upcomingRefreshedAt = 0;
async function refreshUpcoming(force) {
  if (!CONFIG.liveUpcomingUrl) return;
  if (!force && Date.now() - upcomingRefreshedAt < 60000) return; // auto-refresh at most 1x/min
  const info = $("#hUpInfo");
  if (info) info.textContent = "Refreshing from Reclub…";
  try {
    const r = await fetch(CONFIG.liveUpcomingUrl);
    if (!r.ok) throw new Error(r.status);
    const fresh = await r.json();
    if (Array.isArray(fresh)) {
      UPCOMING = fresh;
      upcomingRefreshedAt = Date.now();
      const keepSel = $("#hUpcoming") ? $("#hUpcoming").value : "";
      if (currentView === "host" && !draftMeet) {
        renderHost();
        if (keepSel && UPCOMING.find(u => u.id === keepSel)) {
          $("#hUpcoming").value = keepSel;
          applyUpcoming(keepSel);
        } else if ($("#hUpInfo")) {
          $("#hUpInfo").textContent = `Updated from Reclub · ${UPCOMING.length} upcoming meets · ${new Date().toLocaleTimeString()}`;
        }
      }
    }
  } catch (e) {
    if ($("#hUpInfo")) $("#hUpInfo").textContent = "Refresh failed — using last known data.";
  }
}

/* host-only: trigger the GitHub Actions full data sync.
   Serverless mode (CONFIG.updateBlob): the PAT is stored encrypted with the host
   password; wrong password simply fails to decrypt. Nothing secret is readable
   in the page source, and hosts don't need GitHub accounts. */
async function decryptBlob(password, blobB64) {
  const raw = Uint8Array.from(atob(blobB64), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 310000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(pt);
}

async function hostUpdateData() {
  const pw = prompt("Host password:");
  if (!pw) return;
  const info = $("#hUpInfo");
  if (info) info.textContent = "Starting full data update…";

  if (CONFIG.updateBlob) {
    try {
      const pat = await decryptBlob(pw, CONFIG.updateBlob);
      const r = await fetch(`https://api.github.com/repos/${CONFIG.ghRepo}/actions/workflows/${CONFIG.ghWorkflow}/dispatches`, {
        method: "POST",
        headers: {
          authorization: "Bearer " + pat,
          accept: "application/vnd.github+json",
          "content-type": "application/json"
        },
        body: JSON.stringify({ ref: "main" })
      });
      if (info) info.textContent = r.status === 204
        ? "Update started ✓ — new Reclub data is live in ±3 minutes, then refresh this page."
        : "GitHub refused (" + r.status + ") — token may have expired.";
    } catch (e) {
      if (info) info.textContent = "Wrong password.";
    }
    return;
  }

  // worker mode (if a Cloudflare Worker is configured instead)
  if (!CONFIG.liveUpcomingUrl) return;
  const base = CONFIG.liveUpcomingUrl.replace(/\/upcoming\/?$/, "");
  try {
    const r = await fetch(base + "/update", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json().catch(() => ({}));
    if (info) info.textContent = (r.ok && d.ok)
      ? "Update started — site data refreshes in ±3 minutes."
      : (d.error === "wrong password" ? "Wrong password." : "Update failed: " + (d.error || r.status));
  } catch (e) {
    if (info) info.textContent = "Update failed — check connection.";
  }
}

function applyUpcoming(upId) {
  const info = $("#hUpInfo"), chips = $("#hChips");
  window.hostUpSel = upId || null;
  if (!upId) {
    info.textContent = "";
    $("#hFormat").disabled = false;
    chips.innerHTML = '<span class="muted">Pick a Reclub meet above — its players show up here. Or just type names below.</span>';
    return;
  }
  const up = UPCOMING.find(u => u.id === upId);
  if (!up) return;
  // format follows Reclub — locked; scoring options stay open
  if (up.format) { $("#hFormat").value = up.format; $("#hFormat").disabled = true; onFormatChange(); }
  else $("#hFormat").disabled = false;
  // add players from the Reclub meet that aren't in the roster yet
  up.players.forEach(rp => {
    if (!PLAYERS.find(p => p.id === rp.id)) {
      PLAYERS.push({ id: rp.id, name: rp.name });
      RATINGS[rp.id] = CONFIG.eloStart;
    }
  });
  $("#hName").value = up.name;
  $("#hDate").value = up.date;
  // chips = only this meet's registered players, all selected
  chips.innerHTML = up.players.map(rp =>
    `<div class="chip on" data-id="${rp.id}" onclick="this.classList.toggle('on')">${esc(rp.name)}</div>`).join("")
    || '<span class="muted">Nobody has joined this meet yet — type names below or use ↻ Refresh.</span>';
  const fmtNote = up.format ? ` Format locked from Reclub: ${up.format}${up.teams ? " (partners as registered)" : ""}.` : "";
  info.textContent = `${up.players.length} players registered on Reclub · ${up.venue} · ${up.date} ${up.time}.${fmtNote} Point rules below are yours to choose.`;
}

function startMeet() {
  const format = $("#hFormat").value;
  // selected players = reclub chips (on) + custom names typed below
  let sel = [...document.querySelectorAll("#hChips .chip.on")].map(c => c.dataset.id);
  ($("#hCustom").value || "").split("\n").map(s => s.trim()).filter(Boolean).forEach(n => {
    const id = resolveName(n);
    if (id && !sel.includes(id)) sel.push(id);
  });

  // Team Match: teams come from the team textarea instead
  let bigTeams = null;
  if (format === "team") {
    bigTeams = [];
    const lines = ($("#hTeams").value || "").split("\n").map(s => s.trim()).filter(Boolean);
    for (const line of lines) {
      const ci = line.indexOf(":");
      const tname = ci > -1 ? line.slice(0, ci).trim() : `Team ${bigTeams.length + 1}`;
      const members = (ci > -1 ? line.slice(ci + 1) : line).split(",").map(s => s.trim()).filter(Boolean).map(resolveName);
      if (members.length) bigTeams.push({ name: tname || `Team ${bigTeams.length + 1}`, players: members });
    }
    if (bigTeams.length < 2) { alert("Team Match needs at least 2 teams (one per line: Name: player, player, ...)."); return; }
    const small = bigTeams.filter(t => t.players.length < 2);
    if (small.length) { alert("Every team needs at least 2 players: " + small.map(t => t.name).join(", ")); return; }
    sel = bigTeams.flatMap(t => t.players);
  }
  const courts = Math.max(1, +$("#hCourts").value || 1);
  const rounds = Math.max(1, +$("#hRounds").value || 5);
  const points = Math.max(4, +$("#hPoints").value || 24);
  const [scMode, scTgt] = $("#hMode").value.split(":");
  const scoring = {
    mode: scMode,
    target: scTgt === "custom" ? points : +scTgt,
    tie: $("#hTie").disabled ? "none" : $("#hTie").value
  };
  if (sel.length < 4) { alert("At least 4 players needed — tap Reclub chips or type names."); return; }
  if ((format === "fixed" || format === "shuffle") && sel.length % 2 === 1) { alert("Even number of players needed for pair formats."); return; }
  if (format === "match" && sel.length !== 4) { alert("Single match needs exactly 4 players (first two = team A)."); return; }
  if (format === "king") {
    const need1 = courts * 4, need2 = courts * 4 + 2;
    if (sel.length !== need1 && sel.length !== need2) {
      alert(`King of Court with ${courts} court(s) needs exactly ${need1} players (${courts * 2} teams) or ${need2} players (${courts * 2 + 1} teams, one team resting per round). You selected ${sel.length}.`);
      return;
    }
    if (scoring.mode === "total" && scoring.tie === "draw") {
      alert("King of Court needs a winner every match — change 'If tied' to Golden point (draws are not allowed).");
      return;
    }
  }

  const meet = {
    id: "local" + Date.now(),
    name: $("#hName").value.trim() || "NPC Meet",
    date: $("#hDate").value,
    venue: CONFIG.clubName,
    format, courts, points, scoring,
    liveOpts: { goldenPoint: $("#hDeuce").value === "golden", bestOf: +$("#hSets").value },
    players: sel,
    matches: [],
    source: "local"
  };

  if (format === "match") {
    meet.teams = [[sel[0], sel[1]], [sel[2], sel[3]]];
    meet.matches.push({ round: 1, court: 1, teamA: [sel[0], sel[1]], teamB: [sel[2], sel[3]], scoreA: null, scoreB: null });
  } else if (format === "king") {
    // teams in selection order: players 1&2 = team 1, 3&4 = team 2, ...
    const pairs = [];
    for (let i = 0; i + 1 < sel.length; i += 2) pairs.push([sel[i], sel[i + 1]]);
    meet.teams = pairs;
    // round 1: teams fill courts top to bottom; the extra team (if any) rests
    for (let c = 1; c <= courts; c++) {
      meet.matches.push({
        round: 1, court: c,
        teamA: pairs[(c - 1) * 2].slice(), teamB: pairs[(c - 1) * 2 + 1].slice(),
        scoreA: null, scoreB: null
      });
    }
    meet.kingResting = pairs.length === courts * 2 + 1 ? pairs[courts * 2].slice() : null;
  } else if (format === "team") {
    meet.bigTeams = bigTeams;
    meet.teamMode = $("#hTeamMode").value;
    const T = bigTeams.length;
    const C = Math.min(courts, Math.floor(T / 2));
    if (meet.teamMode === "king" && T !== 2 * C && T !== 2 * C + 1) {
      alert(`Team King of Court with ${courts} court(s) needs ${2 * C} or ${2 * C + 1} teams (you have ${T}). Add/remove a team or change courts.`);
      return;
    }
    if (meet.teamMode === "rr") {
      let roundNo = 0;
      teamRRRounds(T).forEach(pairs => {
        for (let c = 0; c < pairs.length; c += C) {
          roundNo++;
          materializeTeamPairs(meet, pairs.slice(c, c + C).map((p, i) => ({ court: i + 1, a: p[0], b: p[1] })), roundNo);
        }
      });
    } else {
      // mexicano & king start from listed order; extra teams rest
      const pairs = [];
      for (let i = 0; i + 1 < 2 * C; i += 2) pairs.push({ court: i / 2 + 1, a: i, b: i + 1 });
      materializeTeamPairs(meet, pairs, 1);
      meet.kingRestingBt = (meet.teamMode === "king" && T === 2 * C + 1) ? 2 * C : null;
    }
  } else if (format === "americano") {
    const sched = generateAmericano(sel, rounds, courts, Date.now() % 100000);
    sched.forEach((ms, i) => ms.forEach(m => meet.matches.push({ ...m, round: i + 1 })));
  } else if (format === "mexicano") {
    // round 1 seeded by rating
    const seeded = sel.map(id => ({ id, points: Math.round(RATINGS[id] || 1000) }))
      .sort((a, b) => b.points - a.points);
    generateMexicanoRound(seeded, courts).forEach(m => meet.matches.push({ ...m, round: 1 }));
  } else {
    let pairs;
    if (format === "shuffle") pairs = balancedPairs(sel, RATINGS);
    else {
      pairs = [];
      // fixed pairs: take partner pairs registered on Reclub first
      const upSel = $("#hUpcoming") ? $("#hUpcoming").value : "";
      const up = upSel ? UPCOMING.find(u => u.id === upSel) : null;
      if (up && up.teams) {
        pairs = up.teams.filter(t => t.every(id => sel.includes(id))).map(t => t.slice());
      }
      // any remaining selected players: pair in selection order
      const used = new Set(pairs.flat());
      const rest = sel.filter(id => !used.has(id));
      for (let i = 0; i + 1 < rest.length; i += 2) pairs.push([rest[i], rest[i + 1]]);
    }
    meet.teams = pairs;
    const sched = generateRoundRobin(pairs, courts);
    sched.forEach((ms, i) => ms.forEach(m => meet.matches.push({ ...m, round: i + 1 })));
  }
  draftMeet = meet;
  renderDraft();
}

function renderDraft() {
  const meet = draftMeet;
  const byRound = {};
  meet.matches.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });
  const roundsHtml = Object.keys(byRound).sort((a, b) => a - b).map(r =>
    `<div class="roundhead"><h3 style="margin:0">Round ${r}</h3></div>` +
    byRound[r].map((m, i) => {
      const gi = meet.matches.indexOf(m);
      const setsPill = m.sets ? `<span class="pill accent">${m.sets.map(s => s.A + "–" + s.B).join(", ")}</span>` : "";
      const liveBtn = m.scoreA == null
        ? `<button class="btn ghost small" onclick="openLive(${gi})">&#9889; Live score</button>`
        : setsPill;
      const sc = meet.scoring;
      let entry;
      if (meet.format !== "match" && sc && sc.mode === "total" && sc.target <= 8) {
        // quick-pick: all valid finals as tappable pills
        entry = `<span style="display:flex;gap:4px;flex-wrap:wrap">` + scoreOptions(sc).map(([a, b]) =>
          `<span class="chip ${m.scoreA === a && m.scoreB === b ? "on" : ""}" style="padding:4px 9px;font-size:12px"
            onclick="setScorePreset(${gi},${a},${b})">${a}–${b}</span>`).join("") + `</span>`;
      } else {
        const bad = meet.format !== "match" && sc && m.scoreA != null && m.scoreB != null && !m.sets && !validScore(sc, m.scoreA, m.scoreB);
        entry = `<input class="score" type="number" min="0" max="99" value="${m.scoreA == null ? "" : m.scoreA}"
            onchange="setScore(${gi},'A',this.value)" ${bad ? 'style="border-color:var(--red)"' : ""}>
          <span class="vs">vs</span>
          <input class="score" type="number" min="0" max="99" value="${m.scoreB == null ? "" : m.scoreB}"
            onchange="setScore(${gi},'B',this.value)" ${bad ? 'style="border-color:var(--red)"' : ""}>`;
      }
      const teamHtml = (ids, side, bt) => {
        const names = meet.format === "team" && m.scoreA == null && m.scoreB == null
          ? ids.map((id, slot) => `<span style="text-decoration:underline dotted;cursor:pointer" title="Tap to swap with a teammate" onclick="cycleTeamPlayer(${gi},'${side}',${slot})">${esc(nameOf(id))}</span>`).join(" & ")
          : ids.map(nameOf).map(esc).join(" & ");
        const label = bt != null ? `<span class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:.5px">${esc(meet.bigTeams[bt].name)}</span><br>` : "";
        return label + names;
      };
      return `<div class="match">
        <span class="court">Court ${m.court}</span>
        <span class="team">${teamHtml(m.teamA, "A", m.btA)}</span>
        ${entry}
        <span class="team">${teamHtml(m.teamB, "B", m.btB)}</span>
        ${liveBtn}
      </div>`;
    }).join("")).join("");

  if (meet.bigTeams) {
    var bigStHtml = `<table><tr><th>#</th><th>Team</th><th class="num">Played</th><th class="num">Wins</th><th class="num">Diff</th></tr>
      ${bigTeamStandings(meet.bigTeams, meet.matches).map((s, i) =>
        `<tr><td class="${i === 0 ? "rank1" : ""}">${i + 1}</td><td class="${i === 0 ? "rank1" : ""}">${esc(s.name)} <span class="muted">(${meet.bigTeams[s.bt].players.length}p)</span></td><td class="num">${s.played}</td><td class="num">${s.wins}</td><td class="num">${s.ptsFor - s.ptsAgainst > 0 ? "+" : ""}${s.ptsFor - s.ptsAgainst}</td></tr>`).join("")}</table>`;
  }
  const standings = meet.teams
    ? teamStandings(meet.teams, meet.matches)
    : individualStandings(meet.players, meet.matches);
  const standingsHtml = meet.bigTeams ? bigStHtml : meet.teams
    ? `<table><tr><th>#</th><th>Pair</th><th class="num">Played</th><th class="num">Wins</th><th class="num">Diff</th></tr>
       ${standings.map((s, i) => `<tr><td class="${i === 0 ? "rank1" : ""}">${i + 1}</td><td class="${i === 0 ? "rank1" : ""}">${s.team.map(nameOf).map(esc).join(" & ")}</td><td class="num">${s.played}</td><td class="num">${s.wins}</td><td class="num">${s.ptsFor - s.ptsAgainst > 0 ? "+" : ""}${s.ptsFor - s.ptsAgainst}</td></tr>`).join("")}</table>`
    : `<table><tr><th>#</th><th>Player</th><th class="num">Points</th><th class="num">Wins</th><th class="num">Played</th></tr>
       ${standings.map((s, i) => `<tr><td class="${i === 0 ? "rank1" : ""}">${i + 1}</td><td class="${i === 0 ? "rank1" : ""}">${esc(nameOf(s.id))}</td><td class="num">${s.points}</td><td class="num">${s.wins}</td><td class="num">${s.played}</td></tr>`).join("")}</table>`;

  const allScored = meet.matches.every(m => m.scoreA != null && m.scoreB != null);
  const mexBtn = meet.format === "mexicano"
    ? `<button class="btn ghost" onclick="nextMexicanoRound()" ${allScored ? "" : "disabled"}>Generate next round from standings</button>` : "";
  const kingBtn = meet.format === "king"
    ? `<button class="btn ghost" onclick="nextKingRound()" ${allScored ? "" : "disabled"}>Next round — winners up, losers down</button>` : "";
  const teamBtn = meet.format === "team" && meet.teamMode !== "rr"
    ? `<button class="btn ghost" onclick="nextTeamRound()" ${allScored ? "" : "disabled"}>${meet.teamMode === "king" ? "Next round — winning team moves up" : "Next round from team standings"}</button>` : "";
  const restingNote = meet.format === "king" && meet.kingResting
    ? `<span class="pill" style="align-self:center">Resting: ${meet.kingResting.map(nameOf).map(esc).join(" & ")}</span>`
    : (meet.format === "team" && meet.kingRestingBt != null
      ? `<span class="pill" style="align-self:center">Resting: ${esc(meet.bigTeams[meet.kingRestingBt].name)}</span>` : "");

  main.innerHTML = `<span class="back" onclick="if(confirm('Discard this meet?')){draftMeet=null;renderHost();}">&larr; discard</span>
    <h2>${esc(meet.name)} <span class="pill">${esc(meet.format)}</span> <span class="pill">${meet.date}</span></h2>
    <div class="banner">Rules: <b>${esc(scoringLabel(meet.scoring) || "free scoring")}</b>. Enter scores as matches finish — standings update live. ${meet.format === "mexicano" ? "Next round is generated from current standings." : ""}</div>
    ${roundsHtml}
    <div style="display:flex;gap:10px;flex-wrap:wrap">${mexBtn}${kingBtn}${teamBtn}${restingNote}
    <button class="btn" onclick="finishMeet()" ${allScored ? "" : "disabled"}>Finish & save meet</button></div>
    <h3>Live standings</h3>${standingsHtml}`;
}

/* ---------- live scoring UI ---------- */
let draftLive = null; // { matchIdx, state, snaps: [] }

function openLive(matchIdx) {
  draftLive = { matchIdx, state: null, snaps: [] };
  renderLiveSetup();
}

function renderLiveSetup() {
  const m = draftMeet.matches[draftLive.matchIdx];
  const opts = draftMeet.liveOpts || { goldenPoint: true, bestOf: 1 };
  const radio = (team, idx, id) =>
    `<label style="display:flex;align-items:center;gap:8px;margin:6px 0;cursor:pointer;color:var(--text);font-size:14px">
      <input type="radio" name="firstSrv" value="${team}:${idx}" ${team === "A" && idx === 0 ? "checked" : ""}>
      ${esc(nameOf(id))} <span class="muted">(Team ${team})</span></label>`;
  main.innerHTML = `<span class="back" onclick="draftLive=null;renderDraft()">&larr; back to meet</span>
    <h2>Live scoring — Court ${m.court}</h2>
    <div class="panel">
      <h3 style="margin-top:0">${m.teamA.map(nameOf).map(esc).join(" & ")} <span class="vs">vs</span> ${m.teamB.map(nameOf).map(esc).join(" & ")}</h3>
      <label>Who serves first?</label>
      ${radio("A", 0, m.teamA[0])}${radio("A", 1, m.teamA[1])}${radio("B", 0, m.teamB[0])}${radio("B", 1, m.teamB[1])}
      <div class="muted">Rules: ${opts.goldenPoint ? "golden point at 40–40" : "advantage deuce"} · ${draftMeet.format !== "match" && draftMeet.scoring ? esc(scoringLabel(draftMeet.scoring)) + " (games)" : (opts.bestOf === 3 ? "best of 3 sets" : "1 set") + " · tiebreak at 6–6"}</div>
      <button class="btn" onclick="startLive()">Start match</button>
    </div>`;
}

function startLive() {
  const m = draftMeet.matches[draftLive.matchIdx];
  const opts = draftMeet.liveOpts || { goldenPoint: true, bestOf: 1 };
  const [team, idx] = document.querySelector('input[name="firstSrv"]:checked').value.split(":");
  const engineOpts = {
    goldenPoint: opts.goldenPoint, bestOf: opts.bestOf,
    firstTeam: team, firstPlayerIdx: +idx
  };
  // meet matches (not "Single match") play to the meet's game target, not full sets
  if (draftMeet.format !== "match" && draftMeet.scoring) {
    engineOpts.matchMode = "games";
    engineOpts.gscoring = draftMeet.scoring;
  }
  draftLive.state = createLiveMatch(m.teamA, m.teamB, engineOpts);
  renderLive();
}

function liveDo(action, player) {
  const st = draftLive.state;
  draftLive.snaps.push(JSON.stringify(st));
  if (draftLive.snaps.length > 500) draftLive.snaps.shift();
  liveAction(st, action, player ? { player } : undefined);
  renderLive();
}

function liveUndo() {
  if (!draftLive.snaps.length) return;
  draftLive.state = JSON.parse(draftLive.snaps.pop());
  renderLive();
}

function renderLive() {
  const st = draftLive.state;
  const server = liveCurrentServer(st);
  const setCells = t => st.sets.map(s => `<td class="num">${s[t]}${s.tb ? `<sup class="muted">${s.tb[t]}</sup>` : ""}</td>`).join("");
  const ptsLbl = livePointsDisplay(st);
  const teamRow = (t, ids) => `<tr>
      <td style="font-weight:600">${ids.map(id => `${esc(nameOf(id))}${id === server && !st.finished ? ' <span class="pill accent" style="font-size:9px">SERVE' + (st.secondServe ? " · 2nd" : "") + "</span>" : ""}`).join(" & ")}</td>
      ${setCells(t)}
      <td class="num" style="font-size:18px;font-weight:700">${st.games[t]}</td>
      <td class="num" style="font-size:18px;font-weight:700;color:var(--accent)">${st.tiebreak ? st.tbPts[t] : (st.pts.A >= 3 && st.pts.B >= 3 ? (st.pts[t] > st.pts[t === "A" ? "B" : "A"] ? "Ad" : "40") : PTS_LABEL[Math.min(st.pts[t], 3)])}</td>
    </tr>`;

  let controls = "";
  if (st.finished) {
    const finalScore = st.matchMode === "games"
      ? `${st.games.A}–${st.games.B}${st.tbFinal ? ` (TB ${st.tbFinal.A}–${st.tbFinal.B})` : ""}`
      : st.sets.map(s => s.A + "–" + s.B).join(", ");
    const headline = st.winner == null
      ? `Match over — draw ${finalScore}`
      : `Match over — ${esc((st.winner === "A" ? st.teamA : st.teamB).map(nameOf).join(" & "))} win ${finalScore}`;
    controls = `<div class="banner" style="border-color:var(--accent);color:var(--accent)">${headline}</div>
      <button class="btn" onclick="saveLive()">Save result to meet</button>`;
  } else if (st.phase === "serve") {
    controls = `<h3>Serve — ${esc(nameOf(server))} (${st.secondServe ? "2nd serve" : "1st serve"})</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" onclick="liveDo('in')">In — play on</button>
        <button class="btn ghost" onclick="liveDo('let')">Let — replay</button>
        <button class="btn ghost" style="color:var(--red)" onclick="liveDo('fault')">${st.secondServe ? "Double fault" : "Fault"}</button>
      </div>`;
  } else {
    const btns = (ids, team) => ids.map(id => `
      <div style="display:flex;gap:6px;align-items:center;margin:4px 0">
        <span style="min-width:110px;font-size:13px">${esc(nameOf(id))}</span>
        <button class="btn small" onclick="liveDo('winner','${id}')">Winner</button>
        <button class="btn ghost small" style="color:var(--red)" onclick="liveDo('error','${id}')">Error</button>
      </div>`).join("");
    controls = `<h3>Rally over — who ended it, and how?</h3>
      <div class="row">
        <div><div class="muted">Team A</div>${btns(st.teamA, "A")}</div>
        <div><div class="muted">Team B</div>${btns(st.teamB, "B")}</div>
      </div>
      <div class="muted" style="margin-top:6px">Winner = clean point by that player · Error = that player's fault/mistake (point goes to the other team)</div>`;
  }

  const logRows = st.log.slice(-12).reverse().map(e => {
    if (e.type === "let") return `<tr><td>${e.n}</td><td colspan="3" class="muted">Let — serve replayed (${esc(nameOf(e.server))})</td><td></td></tr>`;
    const how = e.type === "winner" ? `Winner — ${esc(nameOf(e.player))}`
      : e.type === "error" ? `Error — ${esc(nameOf(e.player))}`
      : `Double fault — ${esc(nameOf(e.player))}`;
    return `<tr><td>${e.n}</td><td>S${e.set} G${e.game}${e.tb ? " TB" : ""}</td>
      <td>${esc(nameOf(e.server))}${e.second ? " (2nd)" : ""}</td>
      <td>${how}</td><td class="muted">${esc(e.score || "")}</td></tr>`;
  }).join("");

  const stats = liveStatsFromLog(st.log);
  const statRows = Object.entries(stats).map(([id, s]) =>
    `<tr><td>${esc(nameOf(id))}</td><td class="num">${s.winners}</td><td class="num">${s.errors}</td><td class="num">${s.doubles}</td>
     <td class="num">${s.svc}</td><td class="num">${s.svc ? Math.round(100 * (s.svc - s.svcSecond) / s.svc) + "%" : "–"}</td></tr>`).join("");

  main.innerHTML = `<span class="back" onclick="if(confirm('Leave this match? Progress is lost.')){draftLive=null;renderDraft();}">&larr; abandon match</span>
    <h2>Live — ${ptsLbl}</h2>
    <table style="max-width:560px"><tr><th>Team</th>${st.sets.map((_, i) => `<th class="num">S${i + 1}</th>`).join("")}<th class="num">Games</th><th class="num">Pts</th></tr>
      ${teamRow("A", st.teamA)}${teamRow("B", st.teamB)}</table>
    <div style="margin:16px 0">${controls}</div>
    <button class="btn ghost small" onclick="liveUndo()" ${draftLive.snaps.length ? "" : "disabled"}>&#8630; Undo last action</button>
    ${statRows ? `<h3>Player stats</h3><table style="max-width:560px"><tr><th>Player</th><th class="num">Winners</th><th class="num">Errors</th><th class="num">DF</th><th class="num">Serve pts</th><th class="num">1st in</th></tr>${statRows}</table>` : ""}
    ${logRows ? `<h3>Point log (latest first)</h3><table><tr><th>#</th><th>Pos</th><th>Server</th><th>Outcome</th><th>Score after</th></tr>${logRows}</table>` : ""}`;
}

function saveLive() {
  const st = draftLive.state;
  const m = draftMeet.matches[draftLive.matchIdx];
  if (st.matchMode === "games") {
    m.scoreA = st.games.A;
    m.scoreB = st.games.B;
    if (st.tbFinal) m.tbFinal = st.tbFinal;
  } else {
    m.scoreA = st.sets.reduce((s, x) => s + x.A, 0);
    m.scoreB = st.sets.reduce((s, x) => s + x.B, 0);
    m.sets = st.sets;
  }
  m.live = { log: st.log, stats: liveStatsFromLog(st.log), winner: st.winner };
  draftLive = null;
  renderDraft();
}

function setScore(matchIdx, side, val) {
  const m = draftMeet.matches[matchIdx];
  const v = val === "" ? null : Math.max(0, +val);
  if (side === "A") m.scoreA = v; else m.scoreB = v;
  // total-points mode: auto-fill the other side when it makes a valid score
  const sc = draftMeet.scoring;
  if (sc && sc.mode === "total" && v != null && draftMeet.format !== "match") {
    const other = side === "A" ? "scoreB" : "scoreA";
    if (m[other] == null) {
      const guess = sc.target - v;
      if (validScore(sc, side === "A" ? v : guess, side === "A" ? guess : v)) m[other] = guess;
    }
  }
  renderDraft();
}

function setScorePreset(matchIdx, a, b) {
  const m = draftMeet.matches[matchIdx];
  m.scoreA = a; m.scoreB = b;
  renderDraft();
}

/* ---------- Team Match helpers (pure parts live in core) ---------- */

/* swap a fielded player with the next teammate on the bench (tap the name) */
function cycleTeamPlayer(matchIdx, side, slot) {
  const meet = draftMeet;
  const m = meet.matches[matchIdx];
  if (m.scoreA != null || m.scoreB != null) return; // locked once scored
  const bt = side === "A" ? m.btA : m.btB;
  const cur = side === "A" ? m.teamA : m.teamB;
  const members = meet.bigTeams[bt].players;
  if (members.length <= 2) return;
  let i = members.indexOf(cur[slot]);
  for (let step = 1; step <= members.length; step++) {
    const cand = members[(i + step) % members.length];
    if (!cur.includes(cand)) { cur[slot] = cand; break; }
  }
  renderDraft();
}

function nextTeamRound() {
  const meet = draftMeet;
  const lastRound = Math.max(...meet.matches.map(m => m.round));
  const prev = meet.matches.filter(m => m.round === lastRound);
  if (prev.some(m => m.scoreA == null || m.scoreB == null)) return;
  const T = meet.bigTeams.length;
  const C = Math.min(meet.courts, Math.floor(T / 2));

  if (meet.teamMode === "king") {
    if (prev.some(m => m.scoreA === m.scoreB)) { alert("Every match needs a winner (no ties) before the next round."); return; }
    // reuse the tested king engine via pseudo team ids "t<idx>"
    const pseudo = prev.map(m => ({ court: m.court, teamA: ["t" + m.btA], teamB: ["t" + m.btB], scoreA: m.scoreA, scoreB: m.scoreB }));
    const res = kingNextRound(pseudo, meet.kingRestingBt != null ? ["t" + meet.kingRestingBt] : null);
    if (!res) { alert("Every match needs a winner (no ties)."); return; }
    materializeTeamPairs(meet, res.matches.map(m => ({ court: m.court, a: +m.teamA[0].slice(1), b: +m.teamB[0].slice(1) })), lastRound + 1);
    meet.kingRestingBt = res.resting ? +res.resting[0].slice(1) : null;
  } else {
    // mexicano: rank by team standings; teams with most matches played rest if capacity is short
    const st = bigTeamStandings(meet.bigTeams, meet.matches);
    const benchN = T - 2 * C;
    let pool = st.map(s => s.bt);
    if (benchN > 0) {
      const played = {};
      st.forEach(s => played[s.bt] = s.played);
      const bench = new Set(pool.slice().sort((a, b) => played[b] - played[a]).slice(0, benchN));
      pool = pool.filter(bt => !bench.has(bt));
    }
    const pairs = [];
    for (let i = 0; i + 1 < pool.length && pairs.length < C; i += 2)
      pairs.push({ court: pairs.length + 1, a: pool[i], b: pool[i + 1] });
    materializeTeamPairs(meet, pairs, lastRound + 1);
  }
  renderDraft();
}

function nextKingRound() {
  const meet = draftMeet;
  const lastRound = Math.max(...meet.matches.map(m => m.round));
  const prev = meet.matches.filter(m => m.round === lastRound);
  const res = kingNextRound(prev, meet.kingResting);
  if (!res) { alert("Every match needs a winner (no ties) before the next round."); return; }
  res.matches.forEach(m => meet.matches.push({ ...m, round: lastRound + 1 }));
  meet.kingResting = res.resting;
  renderDraft();
}

function nextMexicanoRound() {
  const meet = draftMeet;
  const standings = individualStandings(meet.players, meet.matches);
  const nextRound = Math.max(...meet.matches.map(m => m.round)) + 1;
  generateMexicanoRound(standings, meet.courts).forEach(m => meet.matches.push({ ...m, round: nextRound }));
  renderDraft();
}

function finishMeet() {
  const meet = draftMeet;
  if (meet.scoring && meet.format !== "match") {
    const bad = meet.matches.filter(m => !m.sets && !validScore(meet.scoring, m.scoreA, m.scoreB));
    if (bad.length) {
      alert("Invalid scores for the chosen rules (" + scoringLabel(meet.scoring) + "):\n" +
        bad.map(m => `Round ${m.round} Court ${m.court}: ${m.scoreA}–${m.scoreB}`).join("\n"));
      return;
    }
  }
  saveLocalMeet(meet);
  MEETS.push(meet);
  RATINGS = computeRatings(PLAYERS, MEETS);
  draftMeet = null;
  currentView = "meets";
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.view === "meets"));
  showMeet(meet.id);
}

/* ---------- boot ---------- */
loadData().then(render);
</script>
